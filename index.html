<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iraq Compass</title>
    <meta name="description" content="Iraq Compass — Find businesses, restaurants, hotels and events across all 18 Iraqi governorates">
    <meta name="theme-color" content="#07090F">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Poppins:wght@400;600;700&display=swap');
      body {
        font-family: 'Poppins', 'Tajawal', sans-serif;
      }
      @keyframes move-glow-1 {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(10vw, 15vh) scale(1.3); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes move-glow-2 {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-10vw, -15vh) scale(0.8); }
        100% { transform: translate(0, 0) scale(1); }
      }
      .animate-glow-1 {
        animation: move-glow-1 25s ease-in-out infinite;
      }
      .animate-glow-2 {
        animation: move-glow-2 30s ease-in-out infinite;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      [data-reduced-motion="true"] * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.22.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^11.3.19"
  }
}
</script>
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
